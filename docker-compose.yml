x-machine-base: &machine-base
  image: fabricore-machine
  build:
    context: .
    dockerfile: machine/Dockerfile
  restart: unless-stopped
  networks:
    - fabricore
  read_only: true

x-machine-env: &machine-env
  BACKEND_GRPC_URL: http://web:50051
  SIM_SPEED: 1.0
  PART_CYCLE_BASE_MS: 8000
  TELEMETRY_INTERVAL_MS: 3000

networks:
  fabricore:
    external: true

volumes:
  fabricore-postgres:
    external: true

services:
  postgres:
    image: postgres:18.1-alpine
    container_name: fabricore-postgres
    restart: unless-stopped
    volumes:
      - fabricore-postgres:/var/lib/postgresql
    networks:
      - fabricore
    expose:
      - 5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: fabricore-web
    container_name: fabricore-web
    read_only: true
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RecordStore__ConnectionString: ${POSTGRES_CONNECTION_STRING}
    networks:
      - fabricore
    expose:
      - 50051 # GRPC port exposed within network
    ports:
      - "127.0.0.1:8000:8080"

  machine-1:
    <<: *machine-base
    container_name: fabricore-machine-1
    environment:
      <<: *machine-env
      MACHINE_ID: M1

  machine-2:
    <<: *machine-base
    container_name: fabricore-machine-2
    environment:
      <<: *machine-env
      MACHINE_ID: M2

  machine-3:
    <<: *machine-base
    container_name: fabricore-machine-3
    environment:
      <<: *machine-env
      MACHINE_ID: M3

  machine-4:
    <<: *machine-base
    container_name: fabricore-machine-4
    environment:
      <<: *machine-env
      MACHINE_ID: M4
